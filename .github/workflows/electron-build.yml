name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*' # 当您推送形如 v1.0.0 的 tag 时自动触发
  workflow_dispatch: # 允许您在 GitHub Actions 页面手动点击运行
    inputs:
      ref:
        description: 'Git ref (tag/branch) to build'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Electron App
        working-directory: ./frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: InsightGraph-Release-${{ matrix.os }}
          path: |
            frontend/dist_electron/*.exe
            frontend/dist_electron/*.zip
            frontend/dist_electron/*.dmg

      - name: Upload Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.ref || github.ref_name }}
          files: |
            frontend/dist_electron/*.exe
            frontend/dist_electron/*.zip
            frontend/dist_electron/*.dmg
